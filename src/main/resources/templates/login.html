<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tugas Deploy | NIM 20220140080</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h2 {
            color: #333;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* Profile Photo */
        .photo-container {
            margin-bottom: 20px;
        }
        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .profile-photo:hover {
            transform: scale(1.05);
        }

        /* Kata Kata Hari Ini */
        .quote-container {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .quote-label {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .quote-text {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            font-style: italic;
            line-height: 1.4;
        }
        .quote-text-bahasa {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }

        .nim-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 25px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group input::placeholder {
            color: #bbb;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            color: #e74c3c;
            background: #fdecea;
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 13px;
            text-align: center;
            border-left: 4px solid #e74c3c;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .footer p {
            margin: 5px 0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 25px;
            }
            h2 {
                font-size: 24px;
            }
            .quote-text {
                font-size: 16px;
            }
            .profile-photo {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">🔐</div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Silakan login untuk melanjutkan</p>

    <!-- FOTO LOKAL -->
    <div class="photo-container">
        <img src="/images/foto-saya.jpg"
             alt="Profile Photo"
             class="profile-photo"
             th:src="@{/images/photo.jpeg}">
    </div>

    <!-- Kata Kata Hari Ini -->
    <div class="quote-container">
        <div class="quote-label">📝 KATA HARI INI</div>
        <div class="quote-text">"Gerang ra solat, tuo angel sekarat"</div>
    </div>

    <div class="nim-badge">NIM: 20220140080</div>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form method="post" action="/login">
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Masukkan username" required autofocus/>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Masukkan password" required/>
        </div>

        <button type="submit">Login →</button>
    </form>

    <div class="footer">
        <p>Tugas Deploy - Spring Boot</p>
        <p>© 2024 | NIM 20220140080</p>
    </div>
</div>
</body>
</html>
